version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cloth_shop_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: inventory_billing
    ports:
      - "27017:27017"
    volumes:
      - cloth_shop_mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - cloth_shop_network

  api:
    build: .
    container_name: cloth_shop_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/inventory_billing?authSource=admin
      JWT_SECRET: replace_with_a_secure_jwt_secret_at_least_32_characters_long
      JWT_EXPIRE: 7d
      DEFAULT_BUSINESS_ID: default_business_123
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - cloth_shop_network
    volumes:
      - ./logs:/app/logs

  nginx:
    image: nginx:alpine
    container_name: cloth_shop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - cloth_shop_network

volumes:
  cloth_shop_mongodb_data:
    driver: local

networks:
  cloth_shop_network:
    driver: bridge